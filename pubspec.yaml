name: transaction_tracker
description: "SMS Transaction Analyzer - Analyze and track SMS transactions from your device."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.8
  
  # State Management - Riverpod
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Database - Drift
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  
  # Path & File Management
  path_provider: ^2.1.0
  path: ^1.8.0
  
  # Permissions
  permission_handler: ^11.4.0
  
  # SMS Reading
  telephony: any
  
  # Dependency Injection
  get_it: ^7.6.0
  
  # Serialization & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.0
  intl: ^0.19.0
  
  # Charts
  fl_chart: ^0.65.0
  
  # Collections
  collection: ^1.18.0
  injectable: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.0
  drift_dev: ^2.14.0
  freezed: ^2.4.1
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  
  # Testing
  mocktail: ^1.0.0
  injectable_generator: ^2.7.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.

name: Flutter Build APK

on:
  push:
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Set up Java
        uses: actions/setup-java@v4 
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true 
          cache-key: v5-${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Clean
        run: |
          flutter clean
          rm -rf .dart_tool

      - name: Install dependencies
        run: flutter pub get

      - name: Patch telephony namespace
        run: |
          FILE=$(find ~/.pub-cache -path "*/telephony-*/android/build.gradle")
          sed -i '/^android {/a\    namespace "com.shounakmulay.telephony"' $FILE
          MANIFEST=$(find ~/.pub-cache -path "*/telephony-*/android/src/main/AndroidManifest.xml")
          sed -i 's/package="com.shounakmulay.telephony"//g' $MANIFEST

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4 
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
